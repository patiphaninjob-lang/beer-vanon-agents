name: Transcribe Beer Vanon (YouTube)

on:
  schedule:
    - cron: '0 2 * * *'   # 09:00 Bangkok ทุกวัน
  workflow_dispatch:        # รันมือได้

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install groq yt-dlp python-dotenv httpx sentence-transformers numpy

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-paraphrase-multilingual-MiniLM-L12-v2

      # ── Step 1: Transcribe ──────────────────────────────────────────────
      - name: Transcribe remaining videos
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python transcribe_beervanon_folder.py

      # ── Step 2: Merge into master knowledge base ───────────────────────
      - name: Merge YouTube transcripts into beervanon_cleaned.json
        run: python merge_youtube_knowledge.py

      # ── Step 3: Rebuild embeddings ─────────────────────────────────────
      - name: Rebuild embeddings.npz
        run: python build_embeddings.py

      # ── Step 4: Commit & Push everything ───────────────────────────────
      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "beervanon on youtube/videos.json"
          git add "beervanon on youtube/transcripts/"
          git add beervanon_cleaned.json
          git add embeddings.npz
          git diff --staged --quiet || git commit -m "🎙️ Auto-transcribe: update Beer Vanon transcripts [skip ci]"
          git push

      # ── Step 5: Email report ───────────────────────────────────────────
      - name: Send email report
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import json, os, glob, smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime

          VIDEOS_JSON = "beervanon on youtube/videos.json"
          if not os.path.exists(VIDEOS_JSON):
              print("File not found"); exit(0)

          with open(VIDEOS_JSON, "r", encoding="utf-8") as f:
              data = json.load(f)

          done    = [v for v in data if v.get("status") == "done"]
          failed  = [v for v in data if str(v.get("status","")).startswith("failed")]
          pending = [v for v in data if v.get("status") not in ("done",) and not str(v.get("status","")).startswith("failed")]

          total = len(data)
          pct = (len(done) / total * 100) if total > 0 else 0
          bar_filled = int(pct / 5)
          bar = "█" * bar_filled + "░" * (20 - bar_filled)

          # Count master knowledge base
          master_count = 0
          if os.path.exists("beervanon_cleaned.json"):
              with open("beervanon_cleaned.json", encoding="utf-8") as f:
                  master_count = len(json.load(f))

          # Embeddings info
          import numpy as np
          emb_shape = "N/A"
          if os.path.exists("embeddings.npz"):
              d = np.load("embeddings.npz", allow_pickle=True)
              if "embeddings" in d:
                  emb_shape = str(d["embeddings"].shape)

          done_list    = "\n".join(f"  ✅ {v['title'][:65]}" for v in done[-5:]) or "  (ไม่มี)"
          failed_list  = "\n".join(f"  ❌ {v['title'][:55]}\n     {v.get('error','')[:80]}" for v in failed) or "  (ไม่มี)"
          pending_list = "\n".join(f"  ⏳ {v['title'][:65]}" for v in pending[:5]) or "  (ไม่มี)"

          now_utc = datetime.utcnow()
          bkk_h = (now_utc.hour + 7) % 24
          body = (
              "🎙️ Beer Vanon Transcription — Auto Report\n"
              "════════════════════════════════════════\n"
              f"📅 {now_utc.strftime('%Y-%m-%d %H:%M')} UTC  (+7 → {bkk_h:02d}:{now_utc.minute:02d} Bangkok)\n"
              "\n"
              "━━━━ YouTube: beervanon on youtube ━━━━\n"
              f"[{bar}] {pct:.0f}%\n"
              f"✅ เสร็จแล้ว : {len(done)}/{total} วิดีโอ\n"
              f"⏳ รอถอดเสียง: {len(pending)} วิดีโอ\n"
              f"❌ Error      : {len(failed)} วิดีโอ\n"
              "\n"
              "━━━━ Knowledge Base ━━━━\n"
              f"📚 beervanon_cleaned.json : {master_count} entries\n"
              f"🧠 embeddings.npz         : {emb_shape}\n"
              "\n"
              "━━━━ 5 คลิปล่าสุดที่เสร็จ ━━━━\n"
              f"{done_list}\n"
              "\n"
              "━━━━ คิวถัดไป ━━━━\n"
              f"{pending_list}\n"
              "\n"
              "━━━━ Error Details ━━━━\n"
              f"{failed_list}\n"
              "\n"
              "────────────────────────────────────────\n"
              "☁️  GitHub Actions — ปิดเครื่องก็รันได้\n"
          )

          msg = MIMEMultipart()
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = "patiphan.injob@gmail.com"
          msg["Subject"] = f"🎙️ [Transcribe] {len(done)}/{total} done ({pct:.0f}%) | KB: {master_count} | {emb_shape}"
          msg.attach(MIMEText(body, "plain", "utf-8"))

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
                  s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
                  s.send_message(msg)
              print("📧 Email sent")
          except Exception as e:
              print(f"Email error: {e}")
          PYEOF
