name: Transcribe Beer Vanon (New Format)

on:
  schedule:
    - cron: '0 2 * * *'   # 09:00 Bangkok ทุกวัน
  workflow_dispatch:        # รันมือได้

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq yt-dlp python-dotenv httpx

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run transcription
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # แก้ไขสคริปต์ให้รันบน linux (ไม่ต้องใช้ .exe)
          sed -i "s/FFMPEG = str(Path(\"audio\") \/ \"ffmpeg.exe\")/FFMPEG = \"ffmpeg\"/" transcribe_beervanon_folder.py
          python transcribe_beervanon_folder.py

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "beervanon on youtube/videos.json"
          git add "beervanon on youtube/transcripts/*"
          git diff --staged --quiet || git commit -m "🎙️ Cloud Transcribe: update transcripts [skip ci]"
          git push

      - name: Send email report
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import json, os, smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime

          VIDEOS_JSON = "beervanon on youtube/videos.json"
          if not os.path.exists(VIDEOS_JSON):
              print("File not found")
              exit(0)

          with open(VIDEOS_JSON, "r", encoding="utf-8") as f:
              data = json.load(f)

          done = [v for v in data if v.get("status") == "done"]
          failed = [v for v in data if str(v.get("status", "")).startswith("failed")]
          pending = [v for v in data if v.get("status") is None or v.get("status") == "pending"]

          total = len(data)
          pct = (len(done) / total * 100) if total > 0 else 0

          bar_filled = int(pct / 5)
          bar = '█' * bar_filled + '░' * (20 - bar_filled)

          done_list = '\n'.join(f'  ✅ {v["title"][:60]}' for v in done[-5:]) or '  (ไม่มี)'
          error_list = '\n'.join(f'  ❌ {v["title"][:60]}\n     {v.get("error","")[:80]}' for v in failed) or '  (ไม่มี)'
          pending_list = '\n'.join(f'  ⏳ {v["title"][:60]}' for v in pending[:5]) or '  (ไม่มี)'

          body = f"""🎙️ Beer Vanon Transcription Report (NEW)
          ════════════════════════════════════
          📅 {datetime.utcnow().strftime('%Y-%m-%d %H:%M')} UTC

          ━━━━ ความคืบหน้า ━━━━
          [{bar}] {pct:.0f}%
          ✅ เสร็จแล้ว:  {len(done)}/{total} วิดีโอ
          ⏳ รอถอด:   {len(pending)} วิดีโอ
          ❌ Error:    {len(failed)} วิดีโอ

          ━━━━ 5 คลิปล่าสุดที่เสร็จ ━━━━
          {done_list}

          ━━━━ คลิปที่มี Error ━━━━
          {error_list}

          ━━━━ คิวถัดไป ━━━━
          {pending_list}

          ────────────────────────────────────
          ☁️  GitHub Actions — Cloud Transcriber (New Format)
          """

          msg = MIMEMultipart()
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = 'patiphan.injob@gmail.com'
          msg['Subject'] = f'🎙️ [Cloud] Beer Vanon — {len(done)}/{total} done ({pct:.0f}%)'
          msg.attach(MIMEText(body, 'plain', 'utf-8'))

          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
                  s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
                  s.send_message(msg)
              print('📧 Email sent successfully')
          except Exception as e:
              print(f'Failed to send email: {e}')
          PYEOF
