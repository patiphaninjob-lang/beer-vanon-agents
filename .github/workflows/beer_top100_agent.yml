name: Beer Top 100 Market Cap (หุ้น US 100 ตัวใหญ่สุด)

on:
  schedule:
    - cron: '0 23 * * *'       # 06:00 AM Bangkok (UTC+7) ทุกวัน (Safety Net)
  workflow_dispatch:            # รันมือได้จากหน้าเว็บ Dashboard

permissions:
  contents: write               # อนุญาตให้ push docs/data/ กลับ repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # top 100 ใช้เวลา ~10-15 นาที

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-paraphrase-multilingual-minilm

      - name: Install PyTorch (CPU only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Beer Top 100 Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python beer_top100_agent.py

      - name: Commit web archive data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ docs/history-data/
          git diff --cached --quiet || git commit -m "📊 Top 100 report $(date +%Y-%m-%d)"
          git push
