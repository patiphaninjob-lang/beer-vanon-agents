name: Beer Top 100 Market Cap (หุ้น US 100 ตัวใหญ่สุด)

on:
  schedule:
    - cron: '0 14 * * 1-5'    # 21:00 Bangkok (UTC+7) ทุกวันจันทร์-ศุกร์
  workflow_dispatch:            # รันมือได้จาก GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # top 100 ใช้เวลา ~10-15 นาที

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-paraphrase-multilingual-minilm

      - name: Install PyTorch (CPU only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Beer Top 100 Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python beer_top100_agent.py
