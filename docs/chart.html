<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beer Chart</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: flex; flex-direction: column; }
    .topbar { height: 42px; display: flex; align-items: center; gap: 12px; padding: 0 12px; background: #161b22; border-bottom: 1px solid #21262d; flex-shrink: 0; }
    .back { color: #8b949e; text-decoration: none; font-size: 13px; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; }
    .back:hover { color: #fff; border-color: #6366f1; }
    .symbol { color: #fff; font-weight: 700; letter-spacing: 0; }
    .chart-wrap { position: relative; flex: 1; min-height: 0; }
    #tv_chart { position: absolute; inset: 0; }
    .status { position: absolute; inset: 0; display: grid; place-items: center; color: #6b7280; font-size: 14px; pointer-events: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="./">Back</a>
    <div class="symbol" id="symbolLabel">Chart</div>
  </div>
  <main class="chart-wrap">
    <div id="tv_chart"></div>
    <div class="status" id="status">Loading chart...</div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const symbol = (params.get('symbol') || 'NASDAQ:NVDA').replace(/\s+/g, '').toUpperCase();
    document.title = `${symbol} - Beer Chart`;
    document.getElementById('symbolLabel').textContent = symbol;

    function bootTradingView() {
      const status = document.getElementById('status');
      if (!window.TradingView) {
        status.textContent = 'TradingView chart failed to load.';
        return;
      }
      status.textContent = '';
      new TradingView.widget({
        autosize: true,
        symbol,
        interval: 'D',
        timezone: 'Asia/Bangkok',
        theme: 'dark',
        style: '1',
        locale: 'en',
        toolbar_bg: '#0d1117',
        enable_publishing: false,
        hide_side_toolbar: false,
        hide_top_toolbar: false,
        allow_symbol_change: true,
        save_image: false,
        container_id: 'tv_chart'
      });
    }

    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/tv.js';
    script.async = true;
    script.onload = bootTradingView;
    script.onerror = () => {
      document.getElementById('status').textContent = 'TradingView chart failed to load.';
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
