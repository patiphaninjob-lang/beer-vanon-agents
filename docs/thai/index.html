<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>SET100 — Thai Stock Intelligence</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thai Stocks">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --primary: #eab308; /* Thai Gold */
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --up: #10b981;
      --down: #ef4444;
      --border: #334155;
      --accent: #6366f1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.5; font-size: 14px;
    }

    /* ─── Header ─── */
    .app-header {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-circle {
      width: 38px; height: 38px; background: var(--primary); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000;
      box-shadow: 0 0 20px rgba(234, 179, 8, 0.25); font-size: 1.1em;
    }
    .app-title { font-weight: 800; font-size: 1.25em; letter-spacing: -0.02em; color: var(--text); }
    
    .controls { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; flex-wrap: wrap; }
    
    select, input[type=search], .date-picker-btn {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 6px 12px; font-size: 13px; outline: none; height: 36px;
      transition: all 0.2s;
    }
    select:focus, input:focus { border-color: var(--primary); }
    .date-picker-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; min-width: 140px; }
    .date-picker-btn:hover { border-color: var(--primary); }

    .btn-run {
      background: var(--primary); color: #000; border: none; border-radius: 8px;
      padding: 0 16px; height: 36px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-run:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn-run:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

    .settings-btn {
      background: var(--panel); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2em;
    }
    .settings-btn:hover { color: var(--primary); border-color: var(--primary); }

    /* ─── Market Overview ─── */
    .market-bar { background: #0f172a; border-bottom: 1px solid var(--border); padding: 16px 20px; }
    .market-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .market-title { font-weight: 700; color: var(--text-dim); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.08em; }
    .market-actions { display: flex; gap: 8px; }
    .btn-market {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 8px; font-size: 0.85em; cursor: pointer; font-weight: 600;
    }
    .btn-market:hover { border-color: var(--primary); color: var(--primary); }

    .index-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .index-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 15px;
      border-left: 3px solid var(--border);
    }
    .idx-name { font-size: 0.8em; color: var(--text-dim); font-weight: 600; margin-bottom: 4px; }
    .idx-val { font-size: 1.3em; font-weight: 800; }
    .idx-chg { font-size: 0.9em; font-weight: 700; margin-top: 2px; }
    .idx-chart { margin-top: 10px; border-radius: 6px; overflow: hidden; height: 60px; background: #000; position: relative; }
    .idx-chart img { width: 100%; height: 100%; object-fit: cover; }

    /* ─── Grid & Cards ─── */
    .main-content { padding: 20px; max-width: 1440px; margin: 0 auto; }
    .summary-stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; background: var(--panel); padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border); }
    .stat { display: flex; flex-direction: column; }
    .stat-lbl { font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
    .stat-val { font-weight: 800; font-size: 1.1em; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
    
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
      padding: 20px; border-left: 4px solid var(--accent); transition: 0.2s;
    }
    .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ticker-box { display: flex; flex-direction: column; }
    .rank-tag { font-size: 0.7em; background: var(--border); color: var(--text-dim); padding: 1px 6px; border-radius: 4px; width: fit-content; margin-bottom: 4px; font-weight: 700; }
    .ticker-lbl { font-size: 1.4em; font-weight: 900; letter-spacing: -0.01em; }
    .name-lbl { font-size: 0.85em; color: var(--text-dim); font-weight: 500; }
    
    .price-box { text-align: right; }
    .price-lbl { font-size: 1.3em; font-weight: 800; }
    .pct-lbl { font-weight: 700; font-size: 0.95em; }

    .card-meta { font-size: 0.78em; color: var(--text-dim); margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .card-meta strong { color: var(--text); }

    .card-chart { border-radius: 10px; overflow: hidden; background: #000; height: 110px; margin-bottom: 15px; position: relative; }
    .card-chart img { width: 100%; height: 100%; object-fit: cover; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 15px; }
    .card-btn {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 7px; border-radius: 10px; font-size: 0.8em; font-weight: 700; cursor: pointer;
      text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .card-btn:hover { border-color: var(--primary); color: var(--primary); }
    .card-btn.has-notes { background: rgba(234, 179, 8, 0.1); border-color: var(--primary); color: var(--primary); }

    .section-lbl { font-size: 0.75em; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 0.05em; }
    
    .news-item { margin-bottom: 10px; }
    .news-link { color: var(--text); font-weight: 600; text-decoration: none; font-size: 0.88em; line-height: 1.4; display: block; }
    .news-link:hover { color: var(--primary); text-decoration: underline; }
    .news-sum { font-size: 0.8em; color: var(--text-dim); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .analysis-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin-top: 10px; font-size: 0.88em; line-height: 1.6; color: var(--text-dim); border-left: 3px solid var(--primary); }
    .hw-box { display: grid; gap: 8px; margin-top: 10px; }
    .hw-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 10px; font-size: 0.82em; border: 1px solid var(--border); }
    .hw-item strong { color: var(--text); display: block; margin-bottom: 2px; }

    /* ─── Modals ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.9); backdrop-filter: blur(8px);
      z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--panel); border: 1px solid var(--border); border-radius: 24px;
      width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; padding: 25px;
      position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-dim); font-size: 1.5em; cursor: pointer; }
    .modal h2 { font-size: 1.3em; font-weight: 800; margin-bottom: 15px; color: var(--text); }
    
    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; padding: 12px; font-size: 14px; min-height: 120px; outline: none; margin-top: 15px;
      font-family: inherit; line-height: 1.6;
    }
    textarea:focus { border-color: var(--primary); }

    .btn-action {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px 20px; font-weight: 700; cursor: pointer;
    }
    .btn-action:hover { filter: brightness(1.1); }
    
    /* ─── Marker Tooltip ─── */
    .marker-tooltip {
      position: fixed; background: var(--primary); color: #000; padding: 15px;
      border-radius: 14px; font-size: 13px; font-weight: 500; line-height: 1.5;
      max-width: 320px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      display: none; pointer-events: none;
    }
    .chart-marker {
      position: absolute; bottom: 10px; width: 16px; height: 16px;
      background: var(--primary); border: 2.5px solid #fff; border-radius: 50%;
      cursor: pointer; transform: translateX(-50%); z-index: 100;
      box-shadow: 0 0 15px rgba(234, 179, 8, 0.6);
    }

    /* ── Calendar ── */
    .cal-popup {
      position: absolute; top: 45px; right: 0; z-index: 500;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); width: 260px;
    }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 12px;
      font-weight: 700; z-index: 5000; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    @media (max-width: 800px) {
      .app-header { padding: 10px 15px; }
      .controls { order: 3; width: 100%; justify-content: stretch; }
      .controls > * { flex: 1; min-width: 120px; }
      .app-title { font-size: 1.1em; }
    }
  </style>
</head>
<body>

<!-- Settings Modal -->
<div id="settingsOverlay" class="modal-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2>⚙️ Configuration</h2>
    <div style="margin-bottom:20px">
      <label class="section-lbl">GitHub Personal Token</label>
      <input type="password" id="patInput" class="modal-input" placeholder="ghp_..." style="width:100%; background:var(--bg); border:1px solid var(--border); padding:10px; border-radius:8px; color:white">
    </div>
    <div style="margin-bottom:20px">
      <label class="section-lbl">Groq API Key</label>
      <input type="password" id="groqKeyInput" class="modal-input" placeholder="gsk_..." style="width:100%; background:var(--bg); border:1px solid var(--border); padding:10px; border-radius:8px; color:white">
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end">
      <button class="btn-market" onclick="closeSettings()">Cancel</button>
      <button class="btn-action" onclick="saveSettings()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div id="noteOverlay" class="modal-overlay" onclick="if(event.target===this)closeNoteModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeNoteModal()">✕</button>
    <h2>📝 Reflection — <span id="noteModalTicker" style="color:var(--primary)"></span></h2>
    <div id="existingNotesContainer"></div>
    <textarea id="noteInput" placeholder="What is the market feeling today? What is your thesis?"></textarea>
    <div style="display:flex; justify-content:space-between; margin-top:20px; align-items:center">
      <button class="btn-market" onclick="insertHomeworkTemplate()">+ Ch34 Template</button>
      <div style="display:flex; gap:10px">
        <button class="btn-market" onclick="closeNoteModal()">Cancel</button>
        <button class="btn-action" id="saveNoteBtn" onclick="submitNote()">Save Note</button>
      </div>
    </div>
  </div>
</div>

<header class="app-header">
  <div class="logo-area">
    <div class="logo-circle">TH</div>
    <div class="app-title">Intelligence SET100</div>
  </div>
  <div class="controls">
    <div class="cal-wrap" style="position:relative">
      <button id="dateBtn" class="date-picker-btn" onclick="toggleCalendar()">📅 <span id="dateBtnLabel">Loading...</span></button>
      <div id="calPopup" class="cal-popup" style="display:none"></div>
    </div>
    <input type="search" id="searchBox" placeholder="Search Ticker / Sector..." oninput="renderCards()">
    <button class="btn-run" id="runAgentBtn" onclick="runAgent()">🚀 Run</button>
    <button class="settings-btn" onclick="showSettings()">⚙️</button>
  </div>
</header>

<section class="market-bar">
  <div class="market-head">
    <div class="market-title">Market Pulse — <span id="currentDateLbl">...</span></div>
    <div class="market-actions">
      <button class="btn-market" onclick="openMarketHistory()">📈 HISTORY</button>
      <button class="btn-market" onclick="openMarketNote()">🌡️ REFLECT</button>
    </div>
  </div>
  <div id="indexGrid" class="index-grid"></div>
</section>

<main class="main-content">
  <div id="summaryBar" class="summary-stats"></div>
  <div id="grid" class="grid"><div class="state-msg">Initializing intelligence...</div></div>
</main>

<script>
const REPO       = 'patiphaninjob-lang/beer-vanon-agents';
const DATA_DIR   = '../thai-data/';
const NOTES_FILE = '../notes/notes.json';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB3ky96m5kIMzwBYOMkPk7YCrMT_ZEzwHc",
  authDomain: "beam-7645f.firebaseapp.com",
  projectId: "beam-7645f",
  storageBucket: "beam-7645f.firebasestorage.app",
  messagingSenderId: "645933254174",
  appId: "1:645933254174:web:75a7e62fda923c9975500f"
};
const FIRESTORE_DOC_PATH = 'thai-data/thai_top100_notes';
const MONTHS_TH  = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

let currentData     = null;
let notesCache      = {};
let notesSha        = null;
let notesDocRef      = null;
let notesSyncReady   = false;
let activeNoteTicker = null;
let activeNoteStock  = null;
let availableDates  = [];
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;
let calOpen = false;

function fmtDate(d) {
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} ${MONTHS_TH[parseInt(m)]} ${y}`;
}
function fmtCap(cap) {
  if (!cap) return 'N/A';
  if (cap >= 1e12) return `$${(cap/1e12).toFixed(2)}T`;
  if (cap >= 1e9)  return `$${(cap/1e9).toFixed(1)}B`;
  return `$${(cap/1e6).toFixed(0)}M`;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
function fromBase64(str) { return decodeURIComponent(escape(atob(String(str || '').replace(/\s/g, '')))); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Firebase & Sync
function initCloudSync() {
  if (notesSyncReady) return true;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    const [collectionName, docName] = FIRESTORE_DOC_PATH.split('/');
    notesDocRef = db.collection(collectionName).doc(docName);
    notesSyncReady = true;
    return true;
  } catch (e) { return false; }
}

async function loadNotes() {
  initCloudSync();
  try {
    const snap = await notesDocRef.get();
    if (snap.exists) {
      notesCache = snap.data().notes || {};
      return true;
    }
  } catch (e) {}
  
  try {
    const r = await fetch(`${NOTES_FILE}?v=${Date.now()}`).then(r => r.json());
    notesCache = r;
    return true;
  } catch (e) { notesCache = {}; return false; }
}

async function persistNotes() {
  initCloudSync();
  try {
    await notesDocRef.set({ notes: notesCache, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
    return true;
  } catch (e) { return false; }
}

// UI State
async function init() {
  await loadNotes();
  try {
    const dates = await fetch(DATA_DIR + 'index.json?v=' + Date.now()).then(r => r.json());
    availableDates = dates;
    if (dates.length) {
      const urlDate = new URLSearchParams(location.search).get('date');
      const target = (urlDate && dates.includes(urlDate)) ? urlDate : dates[0];
      pickDate(target);
    }
  } catch (e) { document.getElementById('grid').innerHTML = '<div class="state-msg">Error loading index.</div>'; }
}

async function loadDate(date) {
  document.getElementById('grid').innerHTML = '<div class="state-msg">Fetching SET100 data...</div>';
  try {
    const report = await fetch(`${DATA_DIR}${date}.json?v=${Date.now()}`).then(r => r.json());
    currentData = report;
    document.getElementById('currentDateLbl').textContent = fmtDate(date);
    renderMarketOverview();
    renderSummary();
    renderCards();
  } catch (e) { document.getElementById('grid').innerHTML = '<div class="state-msg">Error loading date.</div>'; }
}

function renderMarketOverview() {
  const mi = currentData?.market_indices || {};
  const grid = document.getElementById('indexGrid');
  const items = ['set','set50','set100'].filter(k => mi[k]);
  
  grid.innerHTML = items.map(k => {
    const d = mi[k];
    const up = d.pct_change >= 0;
    const color = up ? 'var(--up)' : 'var(--down)';
    return `
      <div class="index-card" style="border-left-color:${color}">
        <div class="idx-name">${k.toUpperCase()} Index</div>
        <div class="idx-val">${d.price.toLocaleString()}</div>
        <div class="idx-chg" style="color:${color}">${up?'+':''}${d.pct_change}%</div>
        ${d.chart_b64 ? `<div class="idx-chart"><img src="data:image/jpeg;base64,${d.chart_b64}"></div>` : ''}
      </div>
    `;
  }).join('');
}

function renderSummary() {
  const s = currentData.summary || {};
  document.getElementById('summaryBar').innerHTML = `
    <div class="stat"><span class="stat-lbl">Breadth</span><span class="stat-val">${s.gainers || 0}▲ / ${s.losers || 0}▼</span></div>
    <div class="stat"><span class="stat-lbl">Average Change</span><span class="stat-val" style="color:${s.avg_change >= 0 ? 'var(--up)' : 'var(--down)'}">${s.avg_change}%</span></div>
    ${s.top_gainer ? `<div class="stat"><span class="stat-lbl">Leader</span><span class="stat-val" style="color:var(--up)">${s.top_gainer.ticker.replace('.BK','')}</span></div>` : ''}
  `;
}

function renderCards() {
  if (!currentData) return;
  const q = document.getElementById('searchBox').value.toLowerCase();
  let stocks = currentData.stocks.filter(s => s.ticker.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  
  document.getElementById('grid').innerHTML = stocks.map(s => {
    const up = s.pct_change >= 0;
    const color = up ? 'var(--up)' : 'var(--down)';
    const displayTicker = s.ticker.replace('.BK','');
    const myNotes = notesCache[s.ticker] || notesCache[s.ticker.replace('.','-')] || [];

    const analysisHTML = s.analysis ? `<div class="analysis-box"><span class="section-lbl">🍺 Beer View</span>${esc(s.analysis).replace(/\n/g,'<br>')}</div>` : '';
    const newsHTML = (s.news_list || []).slice(0,2).map(n => `
      <div class="news-item">
        <a href="${n.url}" target="_blank" class="news-link">${esc(n.title)}</a>
        <div class="news-sum">${esc(n.summary)}</div>
      </div>
    `).join('');

    return `
      <div class="card" style="border-left-color:${color}">
        <div class="card-head">
          <div class="ticker-box">
            <span class="rank-tag">#${s.rank}</span>
            <span class="ticker-lbl">${displayTicker}</span>
            <span class="name-lbl">${esc(s.name.replace('.BK',''))}</span>
          </div>
          <div class="price-box">
            <div class="price-lbl">${s.price.toFixed(2)}</div>
            <div class="pct-lbl" style="color:${color}">${up?'+':''}${s.pct_change}%</div>
          </div>
        </div>
        <div class="card-meta">Sector: <strong>${s.sector}</strong> | PE: <strong>${s.pe_ratio || 'N/A'}</strong></div>
        <div class="card-chart">
          <img src="data:image/jpeg;base64,${s.chart_b64}">
        </div>
        <div class="btn-row">
          <button class="card-btn ${myNotes.length?'has-notes':''}" onclick="showNoteModal('${s.ticker}')">📝 ${myNotes.length || ''} Reflections</button>
          <a class="card-btn" href="history.html?ticker=${s.ticker}">📈 History</a>
        </div>
        ${newsHTML ? `<span class="section-lbl">Latest News</span>${newsHTML}` : ''}
        ${analysisHTML}
      </div>
    `;
  }).join('');
}

// Note Logic
function showNoteModal(ticker) {
  activeNoteTicker = ticker;
  document.getElementById('noteModalTicker').textContent = ticker.replace('.BK','');
  document.getElementById('noteInput').value = '';
  const notes = notesCache[ticker] || [];
  const container = document.getElementById('existingNotesContainer');
  container.innerHTML = notes.map(n => `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; margin-bottom:10px; font-size:0.85em"><div style="color:var(--primary); font-weight:700">${n.date}</div>${esc(n.note)}</div>`).join('');
  document.getElementById('noteOverlay').style.display = 'flex';
}
function closeNoteModal() { document.getElementById('noteOverlay').style.display = 'none'; }
async function submitNote() {
  const text = document.getElementById('noteInput').value.trim();
  if (!text) return;
  if (!notesCache[activeNoteTicker]) notesCache[activeNoteTicker] = [];
  notesCache[activeNoteTicker].unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], note: text });
  await persistNotes();
  closeNoteModal();
  renderCards();
  showToast('Note saved to cloud');
}

function insertHomeworkTemplate() {
  const template = `1) Market Feeling: \n2) Business Model: \n3) Numbers: \n4) Beer's View: \n5) Competitors: \n6) Plan: `;
  document.getElementById('noteInput').value = template;
}

// Calendar & Utils
function toggleCalendar() { calOpen = !calOpen; document.getElementById('calPopup').style.display = calOpen ? 'block' : 'none'; if(calOpen) renderCalendar(); }
function pickDate(d) { selectedDate = d; document.getElementById('dateBtnLabel').textContent = fmtDate(d); calOpen = false; document.getElementById('calPopup').style.display = 'none'; loadDate(d); }
function renderCalendar() {
  const popup = document.getElementById('calPopup');
  const avail = new Set(availableDates);
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let cells = '';
  for(let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isAvail = avail.has(ds);
    cells += `<div style="padding:8px; text-align:center; border-radius:6px; cursor:${isAvail?'pointer':'default'}; color:${isAvail?'white':'#444'}; background:${ds===selectedDate?'var(--accent)':''}" onclick="${isAvail?`pickDate('${ds}')`:''}"> ${d} </div>`;
  }
  popup.innerHTML = `<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px">${cells}</div>`;
}

function showSettings() { document.getElementById('settingsOverlay').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsOverlay').style.display = 'none'; }
function saveSettings() {
  localStorage.setItem('gh_pat', document.getElementById('patInput').value);
  localStorage.setItem('groq_key', document.getElementById('groqKeyInput').value);
  closeSettings();
  showToast('Settings Saved');
}

function openMarketHistory() { location.href = `history.html?ticker=_MARKET_THAI`; }
function openMarketNote() { showNoteModal('_MARKET_THAI'); }

async function runAgent() {
  const pat = localStorage.getItem('gh_pat');
  if(!pat) { alert('Please set GitHub Token in settings'); showSettings(); return; }
  const r = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/thai_top100_agent.yml/dispatches`, {
    method: 'POST',
    headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ ref: 'main', inputs: { request_id: 'WEB_' + Date.now(), request_source: 'THAI_APP' }})
  });
  if(r.ok) showToast('🚀 Agent Triggered');
}

init();
</script>
