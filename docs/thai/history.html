<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>History — Thai Stock Intelligence</title>
  
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --primary: #eab308;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --up: #10b981;
      --down: #ef4444;
      --border: #334155;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.5; font-size: 14px; }
    
    .top-nav {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 15px;
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn { 
      text-decoration: none; color: var(--text-dim); background: var(--bg);
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 0.85em; font-weight: 600;
    }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); }
    .header-info { display: flex; flex-direction: column; }
    .ticker-name { font-size: 1.2em; font-weight: 800; color: var(--text); }
    .sector-info { font-size: 0.75em; color: var(--text-dim); }

    .content { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    
    .chart-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .canvas-container { background: #000; border-radius: 12px; height: 500px; position: relative; overflow: hidden; }
    canvas { width: 100%; height: 100%; cursor: crosshair; }

    .notes-panel { display: flex; flex-direction: column; gap: 15px; }
    .notes-list { display: flex; flex-direction: column; gap: 10px; max-height: 80vh; overflow-y: auto; padding-right: 5px; }
    .note-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 15px; cursor: pointer; transition: 0.2s;
    }
    .note-card:hover, .note-card.active { border-color: var(--primary); background: #26324a; }
    .note-date { font-size: 0.75em; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
    .note-text { font-size: 0.85em; color: var(--text); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .detail-view {
      margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px;
      border-left: 4px solid var(--primary);
    }
    .detail-head { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .analysis-text { font-size: 0.9em; color: var(--text-dim); white-space: pre-wrap; }

    @media (max-width: 1000px) {
      .content { grid-template-columns: 1fr; }
      .notes-list { max-height: none; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html" class="back-btn">← DASHBOARD</a>
    <div class="header-info">
      <div id="tickerTitle" class="ticker-name">Loading...</div>
      <div id="sectorInfo" class="sector-info">...</div>
    </div>
  </nav>

  <div class="content">
    <div class="chart-panel">
      <div class="chart-header">
        <div style="font-weight: 700">Intel Chart 1D</div>
        <div id="priceInfo" style="font-weight: 800; color: var(--primary)">$0.00</div>
      </div>
      <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
      </div>
      <div id="detailView" class="detail-view">
        <div class="detail-empty">Select a note or marker to view details.</div>
      </div>
    </div>

    <aside class="notes-panel">
      <div style="font-weight: 800; font-size: 1.1em">All Reflections</div>
      <div id="noteList" class="notes-list"></div>
    </aside>
  </div>

  <script>
    const ticker = new URLSearchParams(location.search).get('ticker') || 'DELTA.BK';
    const HIST_DIR = '../thai-history-data/';
    const DATA_DIR = '../thai-data/';
    const NOTES_FILE = '../notes/notes.json';

    let state = {
      ticker: ticker,
      candles: [],
      notes: [],
      archives: {},
      selectedDate: null
    };

    async function init() {
      try {
        const hist = await fetch(`${HIST_DIR}${ticker}.json`).then(r => r.json());
        const db = await fetch(`${NOTES_FILE}?v=${Date.now()}`).then(r => r.json());
        
        state.candles = hist.candles.map(c => ({ date: c[0], open: c[1], high: c[2], low: c[3], close: c[4] }));
        const rawNotes = db[ticker] || db[ticker.replace('.','-')] || [];
        state.notes = rawNotes.sort((a,b) => b.date.localeCompare(a.date));

        updateHeader(hist);
        renderNoteList();
        drawChart();
        
        if (state.notes.length > 0) selectNote(state.notes[0].date);
      } catch (e) {
        console.error(e);
      }
    }

    function updateHeader(hist) {
      const displayTicker = ticker.replace('.BK','');
      document.getElementById('tickerTitle').textContent = displayTicker;
      document.getElementById('sectorInfo').textContent = `${ticker} · Historical Intelligence`;
    }

    function renderNoteList() {
      const list = document.getElementById('noteList');
      list.innerHTML = state.notes.map(n => `
        <div class="note-card ${state.selectedDate === n.date ? 'active' : ''}" onclick="selectNote('${n.date}')">
          <div class="note-date">${n.date}</div>
          <div class="note-text">${n.note}</div>
        </div>
      `).join('');
    }

    async function selectNote(date) {
      state.selectedDate = date;
      renderNoteList();
      
      const detail = document.getElementById('detailView');
      const note = state.notes.find(n => n.date === date);
      
      if (!state.archives[date]) {
        state.archives[date] = await fetch(`${DATA_DIR}${date}.json`).then(r => r.json()).catch(() => null);
      }
      const day = state.archives[date];
      const stock = day?.stocks?.find(s => s.ticker === ticker);

      detail.innerHTML = `
        <div class="detail-head">
          <div style="font-weight: 800; color: var(--primary)">${date}</div>
          <div style="font-weight: 700; color: var(--up)">${stock ? stock.price : ''} (${stock ? stock.pct_change : ''}%)</div>
        </div>
        <div style="margin-bottom: 12px; font-weight: 600">📝 Your Note:</div>
        <div style="margin-bottom: 15px; font-size: 0.9em">${note.note}</div>
        ${stock ? `<div style="margin-bottom: 8px; font-weight: 600; color:var(--primary)">🍺 Beer's Analysis:</div><div class="analysis-text">${stock.analysis}</div>` : ''}
      `;
      
      const candle = state.candles.find(c => c.date === date);
      if (candle) document.getElementById('priceInfo').textContent = `$${candle.close.toFixed(2)}`;
      drawChart();
    }

    function drawChart() {
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const box = canvas.parentNode.getBoundingClientRect();
      canvas.width = box.width * 2; canvas.height = box.height * 2;
      ctx.scale(2, 2);

      const w = box.width, h = box.height;
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);

      if (state.candles.length < 2) return;

      const data = state.candles.slice(-100);
      const min = Math.min(...data.map(c => c.low)) * 0.98;
      const max = Math.max(...data.map(c => c.high)) * 1.02;

      const xFor = i => (i / (data.length - 1)) * w;
      const yFor = p => h - ((p - min) / (max - min)) * h;

      // Line
      ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
      ctx.beginPath();
      data.forEach((c, i) => {
        if (i===0) ctx.moveTo(xFor(i), yFor(c.close));
        else ctx.lineTo(xFor(i), yFor(c.close));
      });
      ctx.stroke();

      // Markers
      data.forEach((c, i) => {
        const hasNote = state.notes.some(n => n.date === c.date);
        if (hasNote) {
          ctx.fillStyle = c.date === state.selectedDate ? var_val('--primary') : '#ffffff33';
          ctx.beginPath();
          ctx.arc(xFor(i), yFor(c.close), c.date === state.selectedDate ? 6 : 4, 0, Math.PI*2);
          ctx.fill();
        }
      });
    }

    function var_val(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    init();
  </script>
</body>
</html>
